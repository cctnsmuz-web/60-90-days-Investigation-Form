<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTNS Data Entry Form</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1b2a;
    color: #fff;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .container { width: 100%; max-width: 480px; }
  h1 {
    font-size: 20px;
    text-align: center;
    color: #ffb703;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 22px;
  }
  .form-card {
    background: #1b2a3d;
    border-radius: 14px;
    padding: 22px;
  }
  label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    margin-top: 16px;
    color: #e0e0e0;
  }
  label .required { color: #ff5252; }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #3a4a5e;
    background: #0d1b2a;
    color: #fff;
    font-size: 15px;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #ffb703;
  }
  small.hint { color: #888; font-size: 11px; display: block; margin-top: 4px; }
  .error-text { color: #ff5252; font-size: 12px; margin-top: 4px; display: none; }
  .btn {
    width: 100%;
    margin-top: 26px;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #2e7d32;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:disabled { background: #555; cursor: not-allowed; }
  .message {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-size: 14px;
    display: none;
  }
  .message.success { background: #1b3a1f; color: #69f0ae; border: 1px solid #2e7d32; }
  .message.failure { background: #3a1b1b; color: #ff8a80; border: 1px solid #b71c1c; }
  footer { text-align: center; margin-top: 20px; font-size: 11px; color: #555; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 CCTNS Data Entry Form</h1>
  <div class="subtitle">Naya FIR / Investigation Entry - Muzaffarnagar</div>
 
  <div class="form-card">
    <form id="entryForm" autocomplete="off">
 
      <label>थाना का नाम (PS Name) <span class="required">*</span></label>
      <input type="text" id="ps_name" name="ps_name" required placeholder="जैसे: कोतवाली, सिविल लाइन...">
 
      <label>विवेचक अधिकारी का नाम (IO Name) <span class="required">*</span></label>
      <input type="text" id="io_name" name="io_name" required placeholder="जैसे: अंकुर शर्मा">
 
      <label>मुकदमा अपराध संख्या (FIR No.) <span class="required">*</span></label>
      <input type="text" id="fir_no" name="fir_no" required placeholder="जैसे: 55/2026">
 
      <label>पंजीकरण तिथि (FIR Date) <span class="required">*</span></label>
      <input type="date" id="fir_date_picker" required>
      <input type="hidden" id="fir_date" name="fir_date">
      <small class="hint">Calendar se select karein - format khud sahi ban jayega</small>
 
      <label>विवेचना प्रकार (Investigation Type) <span class="required">*</span></label>
      <select id="inv_type" name="inv_type" required>
        <option value="" disabled selected>चुनें...</option>
        <option value="60">60 दिवसीय</option>
        <option value="90">90 दिवसीय</option>
      </select>
 
      <label>मोबाइल नंबर (IO Mobile) <span class="required">*</span></label>
      <input type="tel" id="mobile" name="mobile" required placeholder="10 अंक का नंबर" maxlength="10" pattern="[6-9][0-9]{9}">
      <small class="hint">10 अंक, 6-9 से शुरू (जैसे 9876543210)</small>
      <span class="error-text" id="mobileError">कृपया सही 10 अंक का मोबाइल नंबर डालें</span>
 
      <button type="submit" class="btn" id="submitBtn">✅ Submit Entry</button>
 
      <div class="message success" id="successMsg">✅ Data safaltapoorvak save ho gaya!</div>
      <div class="message failure" id="failureMsg"></div>
    </form>
  </div>
 
  <footer>CCTNS Muzaffarnagar &middot; Data Entry Form v1</footer>
</div>
 
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
 
<script>
// ====== YAHAN APNA APPS SCRIPT WEB APP URL DAALEN ======
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0-fKxV46Zfqng4LX7YiEDRJ5sXd1wi4Bqo0bc-3JCMA5Bk14HU88z5h8Bt88yhHfA/exec";
// ========================================================
 
const form = document.getElementById('entryForm');
form.setAttribute('action', APPS_SCRIPT_URL);
form.setAttribute('method', 'POST');
form.setAttribute('target', 'hidden_iframe');
 
const submitBtn = document.getElementById('submitBtn');
const successMsg = document.getElementById('successMsg');
const failureMsg = document.getElementById('failureMsg');
const mobileInput = document.getElementById('mobile');
const mobileError = document.getElementById('mobileError');
const datePicker = document.getElementById('fir_date_picker');
const hiddenDate = document.getElementById('fir_date');
const iframe = document.getElementById('hidden_iframe');
 
let formSubmittedOnce = false;
let isSubmitting = false;
 
mobileInput.addEventListener('input', () => {
  mobileInput.value = mobileInput.value.replace(/\D/g, '').slice(0, 10);
});
 
function formatDateToDDMMYYYY(isoDate) {
  const [y, m, d] = isoDate.split('-');
  return `${d}/${m}/${y}`;
}
 
// Jab hidden iframe load hoga (matlab form submit ho gaya), tab success
// message dikhao. Pehla "load" page-open hote hi (about:blank) fire hota
// hai, usse ignore karte hain isSubmitting flag se.
iframe.addEventListener('load', () => {
  if (isSubmitting) {
    isSubmitting = false;
    successMsg.style.display = 'block';
    form.reset();
    submitBtn.disabled = false;
    submitBtn.innerText = "✅ Submit Entry";
  }
});
 
form.addEventListener('submit', (e) => {
  successMsg.style.display = 'none';
  failureMsg.style.display = 'none';
  mobileError.style.display = 'none';
 
  const mobile = mobileInput.value.trim();
  if (!/^[6-9]\d{9}$/.test(mobile)) {
    e.preventDefault();
    mobileError.style.display = 'block';
    mobileInput.focus();
    return;
  }
 
  const psName = document.getElementById('ps_name').value.trim();
  const ioName = document.getElementById('io_name').value.trim();
  const firNo = document.getElementById('fir_no').value.trim();
  const firDateRaw = datePicker.value;
  const invType = document.getElementById('inv_type').value;
 
  if (!psName || !ioName || !firNo || !firDateRaw || !invType) {
    e.preventDefault();
    failureMsg.innerText = "⚠️ Kripya saare zaroori fields bharen.";
    failureMsg.style.display = 'block';
    return;
  }
 
  // Date ko DD/MM/YYYY format mein hidden field mein daal do, ye hi
  // form ke saath submit hoga
  hiddenDate.value = formatDateToDDMMYYYY(firDateRaw);
 
  isSubmitting = true;
  submitBtn.disabled = true;
  submitBtn.innerText = "Submitting...";
  // e.preventDefault() yahan NAHI lagaya - form normal tareeke se
  // hidden iframe ke through submit hoga
});
</script>
</body>
</html>
